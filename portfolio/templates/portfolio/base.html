<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio — Luís Almoster</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'portfolio/styles.css' %}">
</head>
<body>
    <header>
        <h1>Luís Almoster</h1>
        <nav>
            <a href="{% url 'projetos' %}">Projetos</a>
            <a href="{% url 'tecnologias' %}">Tecnologias</a>
            <a href="{% url 'tfcs' %}">TFCs</a>
            <a href="{% url 'unidades_curriculares' %}">Unidades Curriculares</a>
            <a href="{% url 'competencias' %}">Competências</a>
            <a href="{% url 'formacoes' %}">Formações</a>
            <a href="{% url 'makingof' %}">Making-Of</a>
            <a href="{% url 'sobre' %}">Sobre</a>
            {% if request.user.is_authenticated %}
              <span style='margin-left: 20px;'>{{ request.user.username }}</span>
              <a href='{% url "logout" %}'>Logout</a>
            {% else %}
              <a href='{% url "login" %}'>Login</a>
              <a href='{% url "registo" %}'>Registo</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2026 Luís Almoster</p>
    </footer>
</body>
</html>
